spring.application.name=APIGATEWAY
server.port=8084

eureka.client.service-url.defaultZone=http://localhost:8080/eureka/

# HOTEL SERVICE
spring.cloud.gateway.routes[0].id=HOTELSERVICE
spring.cloud.gateway.routes[0].uri=lb://HOTELSERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/hotel/**,/hotel

# RATING SERVICE
spring.cloud.gateway.routes[1].id=RATINGSERVICES
spring.cloud.gateway.routes[1].uri=lb://RATINGSERVICES
spring.cloud.gateway.routes[1].predicates[0]=Path=/rating/**

# USER SERVICE
spring.cloud.gateway.routes[2].id=USERSERVICE
spring.cloud.gateway.routes[2].uri=lb://USERSERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/**