server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/microservices
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver		
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  config:
    import: optional:configserver:http://localhost:8085
  
#actuators Configuration for fault Tolerance
management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

#Resiliance CIRCUIT-Break Configuration
resilience4j:
  circuitbreaker:
    instances:

      getAllUserBreaker:
        registerHealthIndicator: true      
        slidingWindowSize: 10
        sliding-window-type: count-based
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true

      getUserBYIdBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        sliding-window-type: count-based
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        automaticTransitionFromOpenToHalfOpenEnabled: true

#Resiliance Retry Configuration
  retry:
    instances:

      getAllUserRetry:
        maxAttempts: 3
        waitDuration: 2s

      getUserByIdRetry:
        maxAttempts: 3
        waitDuration: 2s
      